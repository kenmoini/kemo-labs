services:
  postiz:
    image: ghcr.io/gitroomhq/postiz-app:v2.20.2
    container_name: postiz
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      - MAIN_URL=https://postiz.apps.lab.kemo.dev
      - FRONTEND_URL=https://postiz.apps.lab.kemo.dev
      - NEXT_PUBLIC_BACKEND_URL=https://postiz.apps.lab.kemo.dev/api
      - BACKEND_INTERNAL_URL=http://localhost:3000
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=postgresql://${POSTIZ_DB_USER:-postiz}:${POSTIZ_DB_PASSWORD}@192.168.42.15:5432/${POSTIZ_DB_NAME:-postiz}
      - REDIS_URL=redis://192.168.42.15:6379/6
      - TEMPORAL_ADDRESS=temporal:7233
      - IS_GENERAL=true
      - STORAGE_PROVIDER=local
      - UPLOAD_DIRECTORY=/uploads
      - NEXT_PUBLIC_UPLOAD_DIRECTORY=/uploads
      - NX_ADD_PLUGINS=false
      - API_LIMIT=30
      # Disable public registration after initial setup
      # - DISABLE_REGISTRATION=true
      # Social media API keys - uncomment and configure as needed
      # - X_API_KEY=${X_API_KEY}
      # - X_API_SECRET=${X_API_SECRET}
      # - LINKEDIN_CLIENT_ID=${LINKEDIN_CLIENT_ID}
      # - LINKEDIN_CLIENT_SECRET=${LINKEDIN_CLIENT_SECRET}
      # AI content generation (point to local Ollama or OpenAI)
      # - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - postiz-config:/config
      - postiz-uploads:/uploads
    networks:
      bridge42:
        ipv4_address: 192.168.42.72
      postiz-internal:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.postiz.rule=Host(`postiz.apps.lab.kemo.dev`)"
      - "traefik.http.routers.postiz.entrypoints=websecure"
      - "traefik.http.routers.postiz.tls.certresolver=stepca"
      - "traefik.http.services.postiz.loadbalancer.server.port=5000"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  temporal:
    image: temporalio/auto-setup:1.28.1
    container_name: postiz-temporal
    restart: unless-stopped
    depends_on:
      temporal-postgresql:
        condition: service_healthy
      temporal-elasticsearch:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=${TEMPORAL_DB_USER:-temporal}
      - POSTGRES_PWD=${TEMPORAL_DB_PASSWORD}
      - POSTGRES_SEEDS=temporal-postgresql
      - ENABLE_ES=true
      - ES_SEEDS=temporal-elasticsearch
      - ES_VERSION=v7
      - DYNAMIC_CONFIG_FILE_PATH=/etc/temporal/config/dynamicconfig/development-sql.yaml
    volumes:
      - ./dynamicconfig:/etc/temporal/config/dynamicconfig:ro
    networks:
      postiz-internal:
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  temporal-postgresql:
    image: postgres:16-alpine
    container_name: postiz-temporal-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${TEMPORAL_DB_USER:-temporal}
      - POSTGRES_PASSWORD=${TEMPORAL_DB_PASSWORD}
      - POSTGRES_DB=temporal
    volumes:
      - temporal-pg-data:/var/lib/postgresql/data
    networks:
      postiz-internal:
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TEMPORAL_DB_USER:-temporal}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  temporal-elasticsearch:
    image: elasticsearch:7.17.27
    container_name: postiz-temporal-es
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - cluster.routing.allocation.disk.threshold_enabled=true
      - cluster.routing.allocation.disk.watermark.low=512mb
      - cluster.routing.allocation.disk.watermark.high=256mb
      - cluster.routing.allocation.disk.watermark.flood_stage=128mb
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
      - xpack.security.enabled=false
    volumes:
      - temporal-es-data:/usr/share/elasticsearch/data
    networks:
      postiz-internal:
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9200/_cluster/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  temporal-ui:
    image: temporalio/ui:2.34.0
    container_name: postiz-temporal-ui
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=https://postiz.apps.lab.kemo.dev
    networks:
      postiz-internal:
    # Temporal UI is internal-only; access via docker exec or expose temporarily for debugging
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  temporal-admin-tools:
    image: temporalio/admin-tools:1.28.1-tctl-1.18.4-cli-1.4.1
    container_name: postiz-temporal-admin
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    networks:
      postiz-internal:
    stdin_open: true
    tty: true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postiz-config:
  postiz-uploads:
  temporal-pg-data:
  temporal-es-data:

networks:
  bridge42:
    external: true
  postiz-internal:
    driver: bridge
