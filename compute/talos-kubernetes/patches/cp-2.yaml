# Talos machine config patch for talos-cp2
# Control plane node 2 -- 192.168.62.101
machine:
  network:
    hostname: talos-cp2
    interfaces:
      - interface: eth0
        addresses:
          - 192.168.62.101/23
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.62.1
        vip:
          ip: 192.168.62.99
    nameservers:
      - 192.168.62.2
      - 192.168.62.3
  time:
    servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org
  install:
    disk: /dev/vda
