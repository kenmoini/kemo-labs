# Talos machine config patch for talos-cp3
# Control plane node 3 -- 192.168.42.102
machine:
  network:
    hostname: talos-cp3
    interfaces:
      - interface: eth0
        addresses:
          - 192.168.42.102/23
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.42.1
        vip:
          ip: 192.168.42.99
    nameservers:
      - 192.168.42.2
      - 192.168.42.3
  time:
    servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org
  install:
    disk: /dev/vda
