---
services:

  ##############################################################################
  # MariaDB 11.7
  ##############################################################################
  mariadb:
    image: docker.io/library/mariadb:11.7
    container_name: shared-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: default_db
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      MARIADB_GITLAB_PASSWORD: ${MARIADB_GITLAB_PASSWORD}
      MARIADB_MAILCOW_PASSWORD: ${MARIADB_MAILCOW_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./init-scripts/mariadb-init.sh:/docker-entrypoint-initdb.d/01-create-databases.sh:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      databases:
      homelab:
        ipv4_address: 192.168.62.15

  ##############################################################################
  # PostgreSQL 17 (pgvector image for vector extension support)
  ##############################################################################
  postgresql:
    image: docker.io/pgvector/pgvector:pg17
    container_name: shared-postgresql
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      PG_AUTHENTIK_PASSWORD: ${PG_AUTHENTIK_PASSWORD}
      PG_GITLAB_PASSWORD: ${PG_GITLAB_PASSWORD}
      PG_NETBOX_PASSWORD: ${PG_NETBOX_PASSWORD}
      PG_PAPERLESS_PASSWORD: ${PG_PAPERLESS_PASSWORD}
      PG_N8N_PASSWORD: ${PG_N8N_PASSWORD}
      PG_POSTIZ_PASSWORD: ${PG_POSTIZ_PASSWORD}
      PG_SHLINK_PASSWORD: ${PG_SHLINK_PASSWORD}
      PG_AFFINE_PASSWORD: ${PG_AFFINE_PASSWORD}
    volumes:
      - postgresql_data:/var/lib/postgresql/data
      - ./init-scripts/postgres-init.sh:/docker-entrypoint-initdb.d/01-create-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      databases:
      homelab:
        ipv4_address: 192.168.62.16

  ##############################################################################
  # Valkey 8 (Redis-compatible)
  ##############################################################################
  valkey:
    image: docker.io/valkey/valkey:8
    container_name: shared-valkey
    restart: unless-stopped
    command:
      - valkey-server
      - --requirepass
      - ${VALKEY_PASSWORD}
      - --appendonly
      - "yes"
      - --maxmemory
      - 1gb
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${VALKEY_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      databases:
      homelab:
        ipv4_address: 192.168.62.17

  ##############################################################################
  # Eclipse Mosquitto (MQTT broker)
  ##############################################################################
  mosquitto:
    image: docker.io/library/eclipse-mosquitto:2
    container_name: shared-mosquitto
    restart: unless-stopped
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      databases:
      homelab:
        ipv4_address: 192.168.62.18

  ##############################################################################
  # phpMyAdmin (MariaDB web UI, fronted by Traefik)
  ##############################################################################
  phpmyadmin:
    image: docker.io/phpmyadmin/phpmyadmin:latest
    container_name: shared-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
      PMA_ARBITRARY: 0
      UPLOAD_LIMIT: 256M
    depends_on:
      mariadb:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.phpmyadmin.rule=Host(`phpmyadmin.lab.kemo.network`)"
      - "traefik.http.routers.phpmyadmin.entrypoints=websecure"
      - "traefik.http.routers.phpmyadmin.tls.certresolver=stepca"
      - "traefik.http.services.phpmyadmin.loadbalancer.server.port=80"
    networks:
      databases:
      homelab:
        ipv4_address: 192.168.62.19

  ##############################################################################
  # Databasus (automated database backups)
  ##############################################################################
  databasus:
    image: ghcr.io/databasus/databasus:latest
    container_name: shared-databasus
    restart: unless-stopped
    environment:
      DATABASUS_CRON_SCHEDULE: ${DATABASUS_CRON_SCHEDULE:-0 2 * * *}
      DATABASUS_RETENTION_DAYS: ${DATABASUS_RETENTION_DAYS:-30}
      DATABASUS_BACKUP_DIR: /backups
      DATABASUS_MARIADB_HOST: mariadb
      DATABASUS_MARIADB_PORT: 3306
      DATABASUS_MARIADB_USER: root
      DATABASUS_MARIADB_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      DATABASUS_PGSQL_HOST: postgresql
      DATABASUS_PGSQL_PORT: 5432
      DATABASUS_PGSQL_USER: ${POSTGRES_USER:-postgres}
      DATABASUS_PGSQL_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /srv/backups/databases:/backups
    depends_on:
      mariadb:
        condition: service_healthy
      postgresql:
        condition: service_healthy
    networks:
      databases:

##############################################################################
# Volumes
##############################################################################
volumes:
  mariadb_data:
  postgresql_data:
  valkey_data:
  mosquitto_data:
  mosquitto_log:

##############################################################################
# Networks
##############################################################################
networks:
  databases:
    driver: bridge
  homelab:
    external: true
