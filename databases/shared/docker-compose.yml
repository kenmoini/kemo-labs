---
name: shared-db
services:

  ##############################################################################
  # MariaDB 11.4 (MySQL-compatible)
  # https://docs.linuxserver.io/images/docker-mariadb/
  ##############################################################################
  mariadb:
    image: quay.io/linuxserver.io/mariadb:11.4.9
    container_name: shared-mariadb
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - /opt/workdir/caas/databases/shared/mariadb_data:/config:Z
      - ./init-scripts/mariadb-healthcheck.sh:/usr/local/bin/healthcheck.sh:ro,Z
      - ./init-scripts/mariadb-bootstrap.sh:/custom-services.d/mariadb-bootstrap.sh:ro,Z
    labels:
      - "homepage.group=Databases"
      - "homepage.name=MariaDB"
      - "homepage.icon=mariadb.png"
      - "homepage.description='MariaDB database at 192.168.66.15:3306'"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      bridge66:
        ipv4_address: 192.168.66.15

  ##############################################################################
  # PostgreSQL 17 (pgvector image for vector extension support)
  ##############################################################################
  postgresql:
    image: docker.io/pgvector/pgvector:pg17
    container_name: shared-postgresql
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      PG_AUTHENTIK_PASSWORD: ${PG_AUTHENTIK_PASSWORD}
      PG_GITLAB_PASSWORD: ${PG_GITLAB_PASSWORD}
      PG_NETBOX_PASSWORD: ${PG_NETBOX_PASSWORD}
      PG_PAPERLESS_PASSWORD: ${PG_PAPERLESS_PASSWORD}
      PG_N8N_PASSWORD: ${PG_N8N_PASSWORD}
      PG_POSTIZ_PASSWORD: ${PG_POSTIZ_PASSWORD}
      PG_SHLINK_PASSWORD: ${PG_SHLINK_PASSWORD}
      PG_AFFINE_PASSWORD: ${PG_AFFINE_PASSWORD}
    labels:
      - "homepage.group=Databases"
      - "homepage.name=PostgreSQL"
      - "homepage.icon=postgresql.png"
      - "homepage.description='PostgreSQL database at 192.168.66.16:5432'"
    volumes:
      - /opt/workdir/caas/databases/shared/postgresql_data:/var/lib/postgresql/data:Z
      - ./init-scripts/postgres-init.sh:/docker-entrypoint-initdb.d/01-create-databases.sh:ro,Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      bridge66:
        ipv4_address: 192.168.66.16

  ##############################################################################
  # Valkey 9 (Redis-compatible)
  ##############################################################################
  valkey:
    image: docker.io/valkey/valkey:9.0.3
    container_name: shared-valkey
    restart: unless-stopped
    command:
      - valkey-server
      - --requirepass
      - ${VALKEY_PASSWORD}
      - --appendonly
      - "yes"
      - --maxmemory
      - 1gb
      - --maxmemory-policy
      - allkeys-lru
    env_file:
      - .env
    volumes:
      - /opt/workdir/caas/databases/shared/valkey_data:/data:Z
    labels:
      - "homepage.group=Databases"
      - "homepage.name=Valkey"
      - "homepage.icon=valkey.png"
      - "homepage.description='Redis-compatible database at 192.168.66.17:6379'"
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${VALKEY_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      bridge66:
        ipv4_address: 192.168.66.17

  ##############################################################################
  # Eclipse Mosquitto (MQTT broker)
  ##############################################################################
  mosquitto:
    image: docker.io/library/eclipse-mosquitto:2
    container_name: shared-mosquitto
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro,Z
      - /opt/workdir/caas/databases/shared/mosquitto_data:/mosquitto/data:Z
      - /opt/workdir/caas/databases/shared/mosquitto_log:/mosquitto/log:Z
    networks:
      bridge66:
        ipv4_address: 192.168.66.18
    labels:
      - "homepage.group=Databases"
      - "homepage.name=Mosquitto"
      - "homepage.icon=mosquitto.png"
      - "homepage.description='MQTT broker at 192.168.66.18:1883'"
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  ##############################################################################
  # phpMyAdmin 5.2.3 (MariaDB web UI, fronted by Traefik)
  # https://docs.linuxserver.io/images/docker-phpmyadmin/
  ##############################################################################
  phpmyadmin:
    image: quay.io/linuxserver.io/phpmyadmin@sha256:239f1fa322cee7d3aa1271b0c6732f5ca71c52c372cd5dc4d10bd684e7fb352a
    container_name: shared-phpmyadmin
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
      PMA_ARBITRARY: 0
      UPLOAD_LIMIT: 256M
    depends_on:
      mariadb:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.phpmyadmin.rule=Host(`phpmyadmin.lab.kemo.dev`)"
      - "traefik.http.routers.phpmyadmin.entrypoints=websecure"
      - "traefik.http.routers.phpmyadmin.tls.certresolver=stepca"
      - "traefik.http.services.phpmyadmin.loadbalancer.server.port=80"
      - "homepage.group=Databases"
      - "homepage.name=phpMyAdmin"
      - "homepage.icon=phpmyadmin.png"
      - "homepage.description='MariaDB web UI"
      - "homepage.href=https://phpmyadmin.lab.kemo.dev"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      # traefik-proxy:
      bridge66:
        ipv4_address: 192.168.66.19
      

  ##############################################################################
  # Databasus (automated database backups)
  ##############################################################################
  databasus:
    image: docker.io/databasus/databasus:v3.32.1
    container_name: shared-databasus
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASUS_CRON_SCHEDULE: ${DATABASUS_CRON_SCHEDULE:-0 2 * * *}
      DATABASUS_RETENTION_DAYS: ${DATABASUS_RETENTION_DAYS:-30}
      DATABASUS_BACKUP_DIR: /backups
      DATABASUS_MARIADB_HOST: mariadb
      DATABASUS_MARIADB_PORT: 3306
      DATABASUS_MARIADB_USER: root
      DATABASUS_MARIADB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      DATABASUS_PGSQL_HOST: postgresql
      DATABASUS_PGSQL_PORT: 5432
      DATABASUS_PGSQL_USER: ${POSTGRES_USER:-postgres}
      DATABASUS_PGSQL_PASSWORD: ${POSTGRES_PASSWORD}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.databasus.rule=Host(`databasus.lab.kemo.dev`)"
      - "traefik.http.routers.databasus.entrypoints=websecure"
      - "traefik.http.routers.databasus.tls.certresolver=stepca"
      - "traefik.http.services.databasus.loadbalancer.server.port=4005"
      - "homepage.group=Databases"
      - "homepage.name=Databasus"
      - "homepage.icon=databasus.png"
      - "homepage.description='Automated database backups'"
      - "homepage.href=https://databasus.lab.kemo.dev"
    volumes:
      - /opt/workdir/caas/databases/backups:/backups:Z
    depends_on:
      mariadb:
        condition: service_healthy
      postgresql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:4005/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      # traefik-proxy:
      bridge66:
        ipv4_address: 192.168.66.20

  ##############################################################################
  # Adminer 5.4.2 (Database web UI, fronted by Traefik)
  ##############################################################################
  adminer:
    image: docker.io/library/adminer@sha256:3a1582df310cf49a3c9cad2882496eed4596563f8d33250703f8b26e538cef7d
    container_name: shared-adminer
    restart: unless-stopped
    environment:
      ADMINER_DESIGN: win98
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.adminer.rule=Host(`adminer.lab.kemo.dev`)"
      - "traefik.http.routers.adminer.entrypoints=websecure"
      - "traefik.http.routers.adminer.tls.certresolver=stepca"
      - "traefik.http.services.adminer.loadbalancer.server.port=8080"
      - "homepage.group=Databases"
      - "homepage.name=Adminer"
      - "homepage.icon=adminer.png"
      - "homepage.description='Web UI for DBs cause I am noob'"
      - "homepage.href=https://adminer.lab.kemo.dev"
    depends_on:
      mariadb:
        condition: service_healthy
      postgresql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      # traefik-proxy:
      bridge66:
        ipv4_address: 192.168.66.21

##############################################################################
# Networks
##############################################################################
networks:
  # Database bridge
  bridge66:
    external: true
  # traefik-proxy:
  #   external: true