---
services:

  ##############################################################################
  # MariaDB 11.4 (MySQL-compatible)
  # https://docs.linuxserver.io/images/docker-mariadb/
  ##############################################################################
  mariadb:
    image: quay.io/linuxserver.io/mariadb:11.4.9
    container_name: shared-mariadb
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - /opt/workdir/caas/databases/shared/mariadb_data:/var/lib/mysql:Z
      - ./init-scripts/mariadb-init.sh:/docker-entrypoint-initdb.d/01-create-databases.sh:ro,Z
      - ./init-scripts/mariadb-healthcheck.sh:/usr/local/bin/healthcheck.sh:ro,Z
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      bridge66:
        ipv4_address: 192.168.66.15

  ##############################################################################
  # PostgreSQL 17 (pgvector image for vector extension support)
  ##############################################################################
  postgresql:
    image: docker.io/pgvector/pgvector:pg17
    container_name: shared-postgresql
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      PG_AUTHENTIK_PASSWORD: ${PG_AUTHENTIK_PASSWORD}
      PG_GITLAB_PASSWORD: ${PG_GITLAB_PASSWORD}
      PG_NETBOX_PASSWORD: ${PG_NETBOX_PASSWORD}
      PG_PAPERLESS_PASSWORD: ${PG_PAPERLESS_PASSWORD}
      PG_N8N_PASSWORD: ${PG_N8N_PASSWORD}
      PG_POSTIZ_PASSWORD: ${PG_POSTIZ_PASSWORD}
      PG_SHLINK_PASSWORD: ${PG_SHLINK_PASSWORD}
      PG_AFFINE_PASSWORD: ${PG_AFFINE_PASSWORD}
    volumes:
      - /opt/workdir/caas/databases/shared/postgresql_data:/var/lib/postgresql/data:Z
      - ./init-scripts/postgres-init.sh:/docker-entrypoint-initdb.d/01-create-databases.sh:ro,Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      bridge66:
        ipv4_address: 192.168.66.16

  ##############################################################################
  # Valkey 9 (Redis-compatible)
  ##############################################################################
  valkey:
    image: docker.io/valkey/valkey:9.0.3
    container_name: shared-valkey
    restart: unless-stopped
    command:
      - valkey-server
      - --requirepass
      - ${VALKEY_PASSWORD}
      - --appendonly
      - "yes"
      - --maxmemory
      - 1gb
      - --maxmemory-policy
      - allkeys-lru
    env_file:
      - .env
    volumes:
      - /opt/workdir/caas/databases/shared/valkey_data:/data:Z
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${VALKEY_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      bridge66:
        ipv4_address: 192.168.66.17

  ##############################################################################
  # Eclipse Mosquitto (MQTT broker)
  ##############################################################################
  mosquitto:
    image: docker.io/library/eclipse-mosquitto:2
    container_name: shared-mosquitto
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro,Z
      - /opt/workdir/caas/databases/shared/mosquitto_data:/mosquitto/data:Z
      - /opt/workdir/caas/databases/shared/mosquitto_log:/mosquitto/log:Z
    networks:
      bridge66:
        ipv4_address: 192.168.66.18

  ##############################################################################
  # phpMyAdmin 5.2.3 (MariaDB web UI, fronted by Traefik)
  # https://docs.linuxserver.io/images/docker-phpmyadmin/
  ##############################################################################
  phpmyadmin:
    image: quay.io/linuxserver.io/phpmyadmin@sha256:239f1fa322cee7d3aa1271b0c6732f5ca71c52c372cd5dc4d10bd684e7fb352a
    container_name: shared-phpmyadmin
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
      PMA_ARBITRARY: 0
      UPLOAD_LIMIT: 256M
    depends_on:
      mariadb:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.phpmyadmin.rule=Host(`phpmyadmin.lab.kemo.dev`)"
      - "traefik.http.routers.phpmyadmin.entrypoints=websecure"
      - "traefik.http.routers.phpmyadmin.tls.certresolver=stepca"
      - "traefik.http.services.phpmyadmin.loadbalancer.server.port=80"
    networks:
      bridge66:
        ipv4_address: 192.168.66.19

  ##############################################################################
  # Databasus (automated database backups)
  ##############################################################################
  databasus:
    image: docker.io/databasus/databasus:v3.32.1
    container_name: shared-databasus
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASUS_CRON_SCHEDULE: ${DATABASUS_CRON_SCHEDULE:-0 2 * * *}
      DATABASUS_RETENTION_DAYS: ${DATABASUS_RETENTION_DAYS:-30}
      DATABASUS_BACKUP_DIR: /backups
      DATABASUS_MARIADB_HOST: mariadb
      DATABASUS_MARIADB_PORT: 3306
      DATABASUS_MARIADB_USER: root
      DATABASUS_MARIADB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      DATABASUS_PGSQL_HOST: postgresql
      DATABASUS_PGSQL_PORT: 5432
      DATABASUS_PGSQL_USER: ${POSTGRES_USER:-postgres}
      DATABASUS_PGSQL_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /opt/workdir/caas/databases/backups:/backups:Z
    depends_on:
      mariadb:
        condition: service_healthy
      postgresql:
        condition: service_healthy
    networks:
      bridge66:
        ipv4_address: 192.168.66.20

##############################################################################
# Networks
##############################################################################
networks:
  # Database bridge
  bridge66:
    external: true