# =============================================================================
# Eclipse Mosquitto Configuration
# =============================================================================

# MQTT listener (plaintext, private LAN only)
listener 1883
protocol mqtt

# WebSocket listener
listener 9001
protocol websockets

# Authentication - set to true for open access on private LAN
# To require auth, set to false and configure a password_file
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
connection_messages true
log_timestamp true
