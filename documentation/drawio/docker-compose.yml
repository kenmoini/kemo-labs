services:
  drawio:
    image: docker.io/jgraph/drawio:latest
    container_name: drawio
    restart: unless-stopped
    environment:
      - LETS_ENCRYPT_ENABLED=false
      - PUBLIC_DNS=drawio.lab.kemo.dev
      - DRAWIO_SELF_CONTAINED=1
      - DRAWIO_BASE_URL=https://drawio.lab.kemo.dev
    networks:
      bridge42:
        ipv4_address: 192.168.42.52
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.drawio.rule=Host(`drawio.lab.kemo.dev`)"
      - "traefik.http.routers.drawio.entrypoints=websecure"
      - "traefik.http.routers.drawio.tls=true"
      - "traefik.http.routers.drawio.tls.certresolver=stepca"
      - "traefik.http.services.drawio.loadbalancer.server.port=8080"
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  bridge42:
    external: true
