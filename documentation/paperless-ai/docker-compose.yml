services:
  paperless-ai:
    image: docker.io/clusterzx/paperless-ai:latest
    container_name: paperless-ai
    restart: unless-stopped
    environment:
      - PAPERLESS_AI_PORT=3000
      - PAPERLESS_API_URL=${PAPERLESS_API_URL:-https://paperless.lab.kemo.network/api}
      - PAPERLESS_API_TOKEN=${PAPERLESS_API_TOKEN}
      - PAPERLESS_USERNAME=${PAPERLESS_USERNAME:-admin}
      - AI_PROVIDER=${AI_PROVIDER:-ollama}
      - OLLAMA_API_URL=${OLLAMA_API_URL:-http://192.168.62.70:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      - SCAN_INTERVAL=${SCAN_INTERVAL:-*/30 * * * *}
      - PROCESS_PREDEFINED_DOCUMENTS=${PROCESS_PREDEFINED_DOCUMENTS:-yes}
      - TAGS=${TAGS:-pre-process}
      - ADD_AI_PROCESSED_TAG=${ADD_AI_PROCESSED_TAG:-yes}
      - AI_PROCESSED_TAG_NAME=${AI_PROCESSED_TAG_NAME:-ai-processed}
      - PAPERLESS_AI_INITIAL_SETUP=${PAPERLESS_AI_INITIAL_SETUP:-yes}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/New_York}
    volumes:
      - paperless-ai-data:/app/data
    networks:
      homelab-lab:
        ipv4_address: 192.168.62.54
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.paperless-ai.rule=Host(`paperless-ai.lab.kemo.network`)"
      - "traefik.http.routers.paperless-ai.entrypoints=websecure"
      - "traefik.http.routers.paperless-ai.tls=true"
      - "traefik.http.routers.paperless-ai.tls.certresolver=stepca"
      - "traefik.http.services.paperless-ai.loadbalancer.server.port=3000"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  paperless-ai-data:
    name: paperless-ai-data

networks:
  homelab-lab:
    external: true
