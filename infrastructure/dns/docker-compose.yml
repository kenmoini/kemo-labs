services:
  pdns-auth:
    image: quay.io/kenmoini/pdns-auth:4ba2c66
    container_name: pdns-auth
    restart: unless-stopped
    volumes:
      - ./pdns-auth/config/pdns.conf:/etc/powerdns/pdns.conf:ro
      - ./pdns-auth/data/:/var/lib/powerdns/
    networks:
      traefik-proxy:
      homelab-lab:
        ipv4_address: 192.168.42.2
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pdns-auth.rule=Host(`pdns-auth.lab.kemo.dev`)"
      - "traefik.http.routers.pdns-auth.entrypoints=websecure"
      - "traefik.http.routers.pdns-auth.tls.certresolver=stepca"
      - "traefik.http.services.pdns-auth.loadbalancer.server.port=80"
      - "homepage.group=DNS"
      - "homepage.name=PowerDNS Auth"
      - "homepage.icon=powerdns.png"
      - "homepage.description='PowerDNS Authoritative Server'"
      - "homepage.href=https://pdns-auth.lab.kemo.dev"
    healthcheck:
      test: ["CMD-SHELL", "pdnsutil list-all-zones | grep -q lab.kemo.dev || exit 0"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  pdns-recursor:
    image: quay.io/kenmoini/pdns-recursor:4ba2c66
    container_name: pdns-recursor
    restart: unless-stopped
    depends_on:
      pdns-auth:
        condition: service_started
    volumes:
      - ./pdns-recursor/config/recursor.conf:/etc/powerdns/recursor.conf:ro
    networks:
      homelab-lab:
        ipv4_address: 192.168.42.3
    healthcheck:
      test: ["CMD-SHELL", "rec_control ping 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  pihole:
    image: docker.io/pihole/pihole@sha256:300cc8f9e966b00440358aafef21f91b32dfe8887e8bd9a6193ed1c4328655d4
    container_name: pihole
    restart: unless-stopped
    depends_on:
      pdns-recursor:
        condition: service_started
    environment:
      - TZ=${TZ:-America/New_York}
      - FTLCONF_webserver_api_password=${PIHOLE_API_PASSWORD}
      - FTLCONF_dns_listeningMode=all
      - FTLCONF_dns_upstreams=192.168.42.3
    volumes:
      - ./pihole/etc-pihole/:/etc/pihole/
    cap_add:
      - NET_ADMIN
    networks:
      traefik-proxy:
      homelab-lab:
        ipv4_address: 192.168.42.4
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pihole.rule=Host(`pihole.lab.kemo.dev`)"
      - "traefik.http.routers.pihole.entrypoints=websecure"
      - "traefik.http.routers.pihole.tls.certresolver=stepca"
      - "traefik.http.services.pihole.loadbalancer.server.port=80"
      - "homepage.group=DNS"
      - "homepage.name=Pi-hole"
      - "homepage.icon=pihole.png"
      - "homepage.description='Network-wide ad blocker'"
      - "homepage.href=https://pihole.lab.kemo.dev"
    healthcheck:
      test: ["CMD-SHELL", "dig +short +tries=1 +time=2 @127.0.0.1 pi.hole || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  homelab-lab:
    external: true
  traefik-proxy:
    external: true
