services:
  pdns-auth:
    image: quay.io/kenmoini/pdns-auth:4ba2c66
    container_name: pdns-auth
    restart: unless-stopped
    volumes:
      - ./pdns-auth/config/:/etc/pdns/:ro
    networks:
      traefik-proxy:
      bridge42:
        ipv4_address: 192.168.42.2
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pdns-auth.rule=Host(`pdns-auth.lab.kemo.dev`)"
      - "traefik.http.routers.pdns-auth.entrypoints=websecure"
      - "traefik.http.routers.pdns-auth.tls.certresolver=stepca"
      - "traefik.http.services.pdns-auth.loadbalancer.server.port=8081"
      - "homepage.group=DNS"
      - "homepage.name=PowerDNS Auth"
      - "homepage.icon=powerdns.png"
      - "homepage.description='PowerDNS Authoritative Server'"
      - "homepage.href=https://pdns-auth.lab.kemo.dev"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  pdns-recursor:
    image: quay.io/kenmoini/pdns-recursor:ae856c5
    container_name: pdns-recursor
    restart: unless-stopped
    depends_on:
      pdns-auth:
        condition: service_healthy
    cap_add:
      - NET_BIND_SERVICE
    sysctls:
      - net.ipv4.ip_unprivileged_port_start=53
    volumes:
      - ./pdns-recursor/config/recursor.conf:/etc/pdns-recursor/recursor.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pdns-recursor.rule=Host(`pdns-recursor.lab.kemo.dev`)"
      - "traefik.http.routers.pdns-recursor.entrypoints=websecure"
      - "traefik.http.routers.pdns-recursor.tls.certresolver=stepca"
      - "traefik.http.services.pdns-recursor.loadbalancer.server.port=8082"
      - "homepage.group=DNS"
      - "homepage.name=PowerDNS Recursor"
      - "homepage.icon=powerdns.png"
      - "homepage.description='PowerDNS Recursor at 192.168.42.3'"
      - "homepage.href=https://pdns-recursor.lab.kemo.dev"
    networks:
      traefik-proxy:
      bridge42:
        ipv4_address: 192.168.42.3
    healthcheck:
      test: ["CMD-SHELL", "rec_control ping 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  pdns-admin:
    image: ghcr.io/kenmoini/powerdns-admin:807cc03
    container_name: pdns-admin
    restart: unless-stopped
    depends_on:
      pdns-auth:
        condition: service_healthy
      pdns-recursor:
        condition: service_healthy
    volumes:
      - /opt/workdir/caas/dns/pdns-admin/data:/data:Z
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pdnsadmin.rule=Host(`pdnsadmin.lab.kemo.dev`)"
      - "traefik.http.routers.pdnsadmin.entrypoints=websecure"
      - "traefik.http.routers.pdnsadmin.tls.certresolver=stepca"
      - "traefik.http.services.pdnsadmin.loadbalancer.server.port=8080"
      - "homepage.group=DNS"
      - "homepage.name=PowerDNS Admin"
      - "homepage.icon=powerdns.png"
      - "homepage.description='PowerDNS Admin web interface'"
      - "homepage.href=https://pdnsadmin.lab.kemo.dev"
    networks:
      traefik-proxy:
      bridge42:
        ipv4_address: 192.168.42.15
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/servers || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  pihole:
    image: docker.io/pihole/pihole@sha256:300cc8f9e966b00440358aafef21f91b32dfe8887e8bd9a6193ed1c4328655d4
    container_name: pihole
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - /opt/workdir/caas/dns/pihole/etc-pihole/:/etc/pihole/:Z
    cap_add:
      - NET_BIND_SERVICE
    sysctls:
      - net.ipv4.ip_unprivileged_port_start=53
    networks:
      traefik-proxy:
      bridge42:
        ipv4_address: 192.168.42.4
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pihole.rule=Host(`pihole.lab.kemo.dev`)"
      - "traefik.http.routers.pihole.entrypoints=websecure"
      - "traefik.http.routers.pihole.tls.certresolver=stepca"
      - "traefik.http.services.pihole.loadbalancer.server.port=80"
      - "homepage.group=DNS"
      - "homepage.name=Pi-hole"
      - "homepage.icon=pihole.png"
      - "homepage.description='Network-wide ad blocker'"
      - "homepage.href=https://pihole.lab.kemo.dev"
    healthcheck:
      test: ["CMD-SHELL", "dig +short +tries=1 +time=2 @127.0.0.1 pi.hole || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  bridge42:
    external: true
  traefik-proxy:
    external: true
