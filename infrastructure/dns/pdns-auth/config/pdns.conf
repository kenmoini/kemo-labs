include-dir=/etc/pdns/conf.d
launch=gmysql
gmysql-dnssec=yes
gmysql-host=192.168.66.15
gmysql-user=powerdns_auth
gmysql-dbname=powerdns_auth

api=yes
webserver=yes
webserver-port=8081
webserver-address=0.0.0.0
webserver-allow-from=192.168.0.0/16,127.0.0.0/8

local-address=0.0.0.0
local-port=5300

default-soa-edit=INCEPTION-INCREMENT
default-soa-content=ns1.@ admin.@ 0 10800 3600 604800 3600
enable-lua-records=yes
cache-ttl=0
negquery-cache-ttl=10
#log-dns-queries=yes
#logging-facility=4
#loglevel=4
