services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=home.lab.kemo.network,192.168.62.14:3000
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/New_York}
      - HOMEPAGE_VAR_PIHOLE_API_KEY=${PIHOLE_API_KEY:-}
      - HOMEPAGE_VAR_PDNS_AUTH_API_KEY=${PDNS_AUTH_API_KEY:-}
    volumes:
      - ./config/:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      homelab-lab:
        ipv4_address: 192.168.62.14
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homepage.rule=Host(`home.lab.kemo.network`)"
      - "traefik.http.routers.homepage.entrypoints=websecure"
      - "traefik.http.routers.homepage.tls.certresolver=stepca"
      - "traefik.http.services.homepage.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  homelab-lab:
    external: true
