services:
  homepage:
    image: ghcr.io/gethomepage/homepage:v1.12.3
    container_name: homepage
    restart: unless-stopped
    user: "1000:1000"
    group_add:
      - 0
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=dashboard.apps.lab.kemo.dev,192.168.42.14:3000,localhost,127.0.0.1:3000
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/New_York}
      - OTEL_SERVICE_NAME=homepage
    volumes:
      - ./config/:/app/config
      - /var/run/podman/podman.sock:/var/run/docker.sock:ro
      - /opt/workdir/caas/homepage/logs:/data/logs:Z
    networks:
      bridge42:
        ipv4_address: 192.168.42.14
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homepage.rule=Host(`dashboard.apps.lab.kemo.dev`)"
      - "traefik.http.routers.homepage.entrypoints=websecure"
      - "traefik.http.routers.homepage.tls=true"
      - "traefik.http.routers.homepage.tls.certresolver=stepca"
      - "traefik.http.services.homepage.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  bridge42:
    external: true
