services:
  squid:
    image: ubuntu/squid:latest
    container_name: squid
    restart: unless-stopped
    environment:
      - TZ=${TZ:-America/New_York}
    volumes:
      - ./config/squid.conf:/etc/squid/squid.conf:ro
      - ./data/cache/:/var/spool/squid/
      - ./data/logs/:/var/log/squid/
    networks:
      bridge42:
        ipv4_address: 192.168.42.11
    healthcheck:
      test: ["CMD-SHELL", "squidclient -h 127.0.0.1 -p 3128 mgr:info 2>/dev/null | grep -q 'Squid Object Cache' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      - "homepage.group=Services"
      - "homepage.name=Squid"
      - "homepage.icon=squidex.png"
      - "homepage.description='Outbound proxy server'"
      - "homepage.href=https://proxy.lab.kemo.dev"

networks:
  bridge42:
    external: true
