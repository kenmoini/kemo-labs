services:
  wud:
    image: getwud/wud
    container_name: wud
    restart: unless-stopped
    environment:
      - TZ=${TZ:-America/New_York}
      - WUD_WATCHER_LOCAL_CRON=${WUD_WATCHER_LOCAL_CRON:-0 */6 * * *}
      - WUD_WATCHER_LOCAL_WATCHBYDEFAULT=${WUD_WATCHER_LOCAL_WATCHBYDEFAULT:-true}
      - WUD_TRIGGER_NTFY_HOMELAB_URL=${WUD_TRIGGER_NTFY_HOMELAB_URL:-http://192.168.62.82}
      - WUD_TRIGGER_NTFY_HOMELAB_TOPIC=${WUD_TRIGGER_NTFY_HOMELAB_TOPIC:-wud}
      - WUD_TRIGGER_NTFY_HOMELAB_PRIORITY=${WUD_TRIGGER_NTFY_HOMELAB_PRIORITY:-3}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data/store:/store
    networks:
      homelab:
        ipv4_address: 192.168.62.9
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wud.rule=Host(`wud.lab.kemo.network`)"
      - "traefik.http.routers.wud.entrypoints=websecure"
      - "traefik.http.routers.wud.tls.certresolver=stepca"
      - "traefik.http.services.wud.loadbalancer.server.port=3000"
      - "wud.tag.include=^\\d+\\.\\d+\\.\\d+$$"
      - "wud.link.template=https://github.com/getwud/wud/releases/tag/$${major}.$${minor}.$${patch}"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  homelab:
    external: true
