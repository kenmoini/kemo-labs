---
networks:
  homelab-lab:
    external: true

services:
  dozzle:
    image: amir20/dozzle:${DOZZLE_TAG:-v8.12.8}
    container_name: dozzle
    restart: unless-stopped
    environment:
      - DOZZLE_LEVEL=${DOZZLE_LEVEL:-info}
      - DOZZLE_TAILSIZE=${DOZZLE_TAILSIZE:-300}
      - DOZZLE_NO_ANALYTICS=true
      - DOZZLE_ENABLE_ACTIONS=${DOZZLE_ENABLE_ACTIONS:-false}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      homelab-lab:
        ipv4_address: ${STATIC_IP:-192.168.62.31}
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dozzle.rule=Host(`${DOZZLE_DOMAIN:-dozzle.lab.kemo.network}`)"
      - "traefik.http.routers.dozzle.entrypoints=websecure"
      - "traefik.http.routers.dozzle.tls=true"
      - "traefik.http.routers.dozzle.tls.certresolver=step-ca"
      - "traefik.http.services.dozzle.loadbalancer.server.port=8080"
      - "traefik.docker.network=homelab-lab"
