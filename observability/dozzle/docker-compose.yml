---
networks:
  bridge42:
    external: true

services:
  dozzle:
    image: amir20/dozzle:${DOZZLE_TAG:-v8.12.8}
    container_name: dozzle
    restart: unless-stopped
    environment:
      - DOZZLE_LEVEL=${DOZZLE_LEVEL:-info}
      - DOZZLE_TAILSIZE=${DOZZLE_TAILSIZE:-300}
      - DOZZLE_NO_ANALYTICS=true
      - DOZZLE_ENABLE_ACTIONS=${DOZZLE_ENABLE_ACTIONS:-false}
    volumes:
      - /var/run/podman/podman.sock:/var/run/docker.sock:ro
    networks:
      bridge42:
        ipv4_address: ${STATIC_IP:-192.168.42.31}
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dozzle.rule=Host(`${DOZZLE_DOMAIN:-dozzle.apps.lab.kemo.dev}`)"
      - "traefik.http.routers.dozzle.entrypoints=websecure"
      - "traefik.http.routers.dozzle.tls=true"
      - "traefik.http.routers.dozzle.tls.certresolver=stepca"
      - "traefik.http.services.dozzle.loadbalancer.server.port=8080"
      - "homepage.group=Observability"
      - "homepage.name=Dozzle"
      - "homepage.icon=dozzle.png"
      - "homepage.description='Real-time log viewer for Docker containers'"
      - "homepage.href=https://dozzle.apps.lab.kemo.dev"
