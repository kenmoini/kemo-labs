global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_native_histograms: true
otlp:
  keep_identifying_resource_attributes: true
  # Recommended attributes to be promoted to labels.
  promote_resource_attributes:
    - service.instance.id
    - service.name
    - service.namespace
    - service.version
    # - cloud.availability_zone
    # - cloud.region
    - container.name
    - deployment.environment # backward compatibility
    - deployment.environment.name
    # - k8s.cluster.name
    # - k8s.container.name
    # - k8s.cronjob.name
    # - k8s.daemonset.name
    # - k8s.deployment.name
    # - k8s.job.name
    # - k8s.namespace.name
    # - k8s.node.name
    # - k8s.pod.name
    # - k8s.replicaset.name
    # - k8s.statefulset.name
    - host.name
    - postgresql.database.name
    - postgresql.schema.name
    - postgresql.table.name
    - postgresql.index.name
    - database # used by otelcol/receiver/mongodb
    # - kafka.cluster.alias
storage:
  tsdb:
    # A 10min time window is enough because it can easily absorb retries and network delays.
    out_of_order_time_window: 10m
    retention:
      size: 10GB

rule_files:
  - /etc/prometheus/rules/*.yml
  - /etc/prometheus/rules/*.yaml

scrape_configs:
  - job_name: 'prometheus'
    scrape_interval: 1m
    static_configs:
      - targets: ['o11y-prometheus:9090']

  # For Podman daemon metrics to be scraped, an exporter is needed
  # https://github.com/containers/prometheus-podman-exporter/blob/main/install.md
  - job_name: podman-daemon
    static_configs:
      - targets:
          - o11y-podman-exporter:9882
        labels:
          job_name: podman-daemon

  - job_name: 'node'
    # scrape_interval: 1m
    static_configs:
      - targets: ['o11y-node-exporter:9100']

  - job_name: 'grafana'
    scrape_interval: 1m
    static_configs:
      - targets: ['o11y-grafana:3000']

  - job_name: 'image-renderer'
    static_configs:
      - targets: ['o11y-grafana-renderer:8081']

  # Works fine, just limited compared to OTLP
  # - job_name: "traefik"
  #   scrape_interval: 1m
  #   static_configs:
  #     - targets: ["mgmt-traefik:8080"]

# alertmanager
alerting:
  alertmanagers:
  - scheme: http
    static_configs:
    - targets:
      - "o11y-alertmanager:9093"