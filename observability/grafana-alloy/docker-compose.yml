---
networks:
  homelab:
    external: true
  internal:
    driver: bridge

volumes:
  grafana-data:
  loki-data:
  mimir-data:
  tempo-data:

services:
  grafana:
    image: grafana/grafana:${GRAFANA_TAG:-11.6.0}
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_SERVER_ROOT_URL=https://${GRAFANA_DOMAIN:-grafana.lab.kemo.network}
      - GF_SERVER_DOMAIN=${GRAFANA_DOMAIN:-grafana.lab.kemo.network}
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:?GF_ADMIN_PASSWORD must be set}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_LOG_LEVEL=${GF_LOG_LEVEL:-warn}
      - GF_INSTALL_PLUGINS=${GF_INSTALL_PLUGINS:-}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      homelab:
        ipv4_address: ${STATIC_IP:-192.168.62.30}
      internal:
    depends_on:
      loki:
        condition: service_healthy
      mimir:
        condition: service_healthy
      tempo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`${GRAFANA_DOMAIN:-grafana.lab.kemo.network}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls=true"
      - "traefik.http.routers.grafana.tls.certresolver=step-ca"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
      - "traefik.docker.network=homelab"

  loki:
    image: grafana/loki:${LOKI_TAG:-3.5.0}
    container_name: loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki-data:/loki
      - ./config/loki-config.yaml:/etc/loki/local-config.yaml:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  mimir:
    image: grafana/mimir:${MIMIR_TAG:-2.16.0}
    container_name: mimir
    restart: unless-stopped
    command: -config.file=/etc/mimir/mimir.yaml
    volumes:
      - mimir-data:/data
      - ./config/mimir-config.yaml:/etc/mimir/mimir.yaml:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9009/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  tempo:
    image: grafana/tempo:${TEMPO_TAG:-2.7.2}
    container_name: tempo
    restart: unless-stopped
    command: -config.file=/etc/tempo/tempo.yaml
    volumes:
      - tempo-data:/var/tempo
      - ./config/tempo-config.yaml:/etc/tempo/tempo.yaml:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3200/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  alloy:
    image: grafana/alloy:${ALLOY_TAG:-1.9.1}
    container_name: alloy
    restart: unless-stopped
    command:
      - run
      - /etc/alloy/config.alloy
      - --stability.level=generally-available
      - --server.http.listen-addr=0.0.0.0:12345
    volumes:
      - ./config/alloy-config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      homelab:
        ipv4_address: ${ALLOY_IP:-192.168.62.35}
      internal:
    depends_on:
      loki:
        condition: service_healthy
      mimir:
        condition: service_healthy
      tempo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:12345/-/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
