name: o11y
x-common: &common
  networks:
    - bridge42
  restart: unless-stopped
  logging:
    options:
      max-size: 50m
      max-file: "3"
services:
  #############################################################################################
  # Prometheus for Metrics Collection
  #############################################################################################
  prometheus:
    !!merge <<: *common
    # image: prom/prometheus:latest
    image: quay.io/prometheus/prometheus:latest
    container_name: prometheus
    expose:
      - 9090
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus.entrypoints=websecure"
      - "traefik.http.routers.prometheus.service=prometheus"
      - "traefik.http.routers.prometheus.tls=true"
      - "traefik.http.routers.prometheus.rule=Host(`prometheus.apps.lab.kemo.dev`)"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"
      - "homepage.group=Observability"
      - "homepage.name=Prometheus"
      - "homepage.icon=prometheus.png"
      - "homepage.href=https://prometheus.apps.lab.kemo.dev"
      - "homepage.description=Monitoring and Alerting"
    volumes:
      - prometheus_storage:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./dashboards:/etc/prometheus/dashboards
      - ./prometheus-rules:/etc/prometheus/rules
      - ./blackbox-exporter.yml:/etc/prometheus/blackbox-exporter.yml
      - ./web-monitoring-targets.yml:/etc/prometheus/web-monitoring-targets.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.external-url=https://prometheus.apps.lab.kemo.dev"
      - "--web.enable-remote-write-receiver"
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --tries=1 --spider http://localhost:9090/metrics']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s