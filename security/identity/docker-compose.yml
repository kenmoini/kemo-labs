---
services:
  server:
    image: ghcr.io/goauthentik/server:2025.2.4
    container_name: authentik-server
    restart: unless-stopped
    command: server
    env_file:
      - .env
    volumes:
      - authentik-media:/media
      - authentik-templates:/templates
    networks:
      bridge42:
        ipv4_address: 192.168.42.8
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.authentik.rule=Host(`auth.lab.kemo.dev`)"
      - "traefik.http.routers.authentik.tls=true"
      - "traefik.http.routers.authentik.tls.certresolver=step-ca"
      - "traefik.http.services.authentik.loadbalancer.server.port=9000"
      # Forward auth middleware for protecting other services
      - "traefik.http.middlewares.authentik.forwardauth.address=http://192.168.42.8:9000/outpost.goauthentik.io/auth/traefik"
      - "traefik.http.middlewares.authentik.forwardauth.trustForwardHeader=true"
      - "traefik.http.middlewares.authentik.forwardauth.authResponseHeaders=X-authentik-username,X-authentik-groups,X-authentik-email,X-authentik-name,X-authentik-uid,X-authentik-jwt,X-authentik-meta-jwks,X-authentik-meta-outpost,X-authentik-meta-provider,X-authentik-meta-app,X-authentik-meta-version"
    healthcheck:
      test: ["CMD", "ak", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  worker:
    image: ghcr.io/goauthentik/server:2025.2.4
    container_name: authentik-worker
    restart: unless-stopped
    command: worker
    env_file:
      - .env
    volumes:
      - authentik-media:/media
      - authentik-templates:/templates
    networks:
      homelab: {}
    healthcheck:
      test: ["CMD", "ak", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  authentik-media:
    name: authentik-media
  authentik-templates:
    name: authentik-templates

networks:
  bridge42:
    external: true
