---
services:
  pika-pki:
    image: quay.io/kenmoini/pika-pki:latest
    container_name: pika-pki
    stdin_open: true
    tty: true
    env_file:
      - .env
    volumes:
      - /opt/workdir/caas/pika-pki/data:/data
    profiles:
      - interactive
    restart: unless-stopped

  nginx:
    image: docker.io/nginx:1.27-alpine
    container_name: pki-nginx
    restart: unless-stopped
    volumes:
      - /opt/workdir/caas/pika-pki/data:/data:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      homelab-lab:
        ipv4_address: 192.168.62.5
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pki.rule=Host(`pki.lab.kemo.dev`)"
      - "traefik.http.routers.pki.tls=true"
      - "traefik.http.routers.pki.tls.certresolver=step-ca"
      - "traefik.http.services.pki.loadbalancer.server.port=8001"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8001/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  homelab-lab:
    external: true
