server {
    listen 80;
    server_name files.lab.kemo.network;
    root /srv/files;

    autoindex on;
    autoindex_exact_size off;
    autoindex_localtime on;

    location / {
        try_files $uri $uri/ =404;
    }

    # Increase max body size for any direct uploads
    client_max_body_size 1G;
}
